app:
  name: PureMux
  env: local
  host: 0.0.0.0
  port: 8080

mysql:
  host: 127.0.0.1
  port: 3306
  user: root
  password: root
  dbname: puremux
  charset: utf8mb4
  parse_time: true
  loc: Local
  max_open_conns: 20
  max_idle_conns: 10
  conn_max_lifetime_minutes: 60

redis:
  addr: 127.0.0.1:6379
  password: ""
  db: 0
  pool_size: 10
  min_idle_conns: 2

log:
  level: info
  format: json
  output: both
  dir: logs
  filename: app.log
  max_size_mb: 100
  max_backups: 14
  max_age_days: 30
  compress: false
  rotate_daily: true
